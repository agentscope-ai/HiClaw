apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiclaw.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hiclaw.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "hiclaw.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- $rrsaManual := include "hiclaw.manager.rrsaManual" . }}
      serviceAccountName: {{ include "hiclaw.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "hiclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: openclaw
              containerPort: {{ .Values.manager.service.targetPort }}
              protocol: TCP
          {{- $envSecret := include "hiclaw.manager.envFromSecretName" . | trim }}
          {{- if $envSecret }}
          envFrom:
            - secretRef:
                name: {{ $envSecret | quote }}
          {{- end }}
          env:
            - name: HICLAW_K8S_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HICLAW_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- $wsa := include "hiclaw.workerServiceAccountName" . | trim }}
            {{- if $wsa }}
            - name: HICLAW_K8S_WORKER_SERVICE_ACCOUNT
              value: {{ $wsa | quote }}
            {{- end }}
            {{- if .Values.workerImage }}
            - name: HICLAW_WORKER_IMAGE
              value: {{ printf "%s:%s" .Values.workerImage.repository (.Values.workerImage.tag | default "latest") | quote }}
            {{- end }}
            {{- if .Values.copawWorkerImage }}
            - name: HICLAW_COPAW_WORKER_IMAGE
              value: {{ printf "%s:%s" .Values.copawWorkerImage.repository (.Values.copawWorkerImage.tag | default "latest") | quote }}
            {{- end }}
            - name: HICLAW_DEFAULT_WORKER_RUNTIME
              value: {{ .Values.workerRuntime | default "openclaw" | quote }}
            {{- if not .Values.manager.envFromSecret }}
            - name: HICLAW_MATRIX_URL
              value: {{ include "hiclaw.tuwunel.internalMatrixURL" . | quote }}
            - name: HICLAW_MATRIX_DOMAIN
              value: {{ include "hiclaw.tuwunel.matrixServerName" . | quote }}
            {{- end }}
            {{- range $k, $v := .Values.manager.env }}
            {{- if $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            {{- if $rrsaManual }}
            - name: ALIBABA_CLOUD_ROLE_ARN
              value: {{ .Values.manager.rrsa.manual.roleArn | quote }}
            - name: ALIBABA_CLOUD_OIDC_PROVIDER_ARN
              value: {{ .Values.manager.rrsa.manual.oidcProviderArn | quote }}
            - name: ALIBABA_CLOUD_OIDC_TOKEN_FILE
              value: {{ .Values.manager.rrsa.manual.tokenFile | quote }}
            {{- end }}
            {{- if include "hiclaw.worker.rrsaManual" . }}
            - name: HICLAW_K8S_WORKER_RRSA_ROLE_ARN
              value: {{ .Values.workerServiceAccount.rrsa.manual.roleArn | quote }}
            {{- end }}
          {{- if $rrsaManual }}
          volumeMounts:
            - name: rrsa-oidc-token
              mountPath: {{ .Values.manager.rrsa.manual.tokenMountPath | quote }}
              readOnly: true
          {{- end }}
          {{- with .Values.manager.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          {{- $hcCmd := ternary (printf "curl -sf http://127.0.0.1:%v/ >/dev/null" .Values.manager.service.targetPort) (printf "nc -z 127.0.0.1 %v" .Values.manager.service.targetPort) (eq .Values.manager.healthCheck.type "http") }}
          {{- if .Values.manager.healthCheck.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - {{ $hcCmd | quote }}
            initialDelaySeconds: 60
            periodSeconds: {{ .Values.manager.healthCheck.interval | int }}
            timeoutSeconds: 3
            failureThreshold: {{ .Values.manager.healthCheck.unhealthyThreshold | int }}
          {{- end }}
          {{- if .Values.manager.healthCheck.enabled }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - {{ $hcCmd | quote }}
            initialDelaySeconds: 20
            periodSeconds: {{ .Values.manager.healthCheck.interval | int }}
            timeoutSeconds: 3
            successThreshold: {{ .Values.manager.healthCheck.healthyThreshold | int }}
            failureThreshold: {{ .Values.manager.healthCheck.unhealthyThreshold | int }}
          {{- end }}
      {{- if $rrsaManual }}
      volumes:
        - name: rrsa-oidc-token
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  audience: sts.aliyuncs.com
                  expirationSeconds: {{ .Values.manager.rrsa.manual.expirationSeconds }}
                  path: token
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
