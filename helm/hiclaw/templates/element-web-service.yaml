apiVersion: v1
kind: Service
metadata:
  name: {{ include "hiclaw.elementWeb.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.elementWeb.labels" . | nindent 4 }}
  {{- with .Values.elementWeb.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.elementWeb.service.type }}
  selector:
    {{- include "hiclaw.elementWeb.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.elementWeb.service.port }}
      targetPort: http
      protocol: TCP
