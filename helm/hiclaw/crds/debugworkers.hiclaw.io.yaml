apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: debugworkers.hiclaw.io
spec:
  group: hiclaw.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [model, targets]
              properties:
                model:
                  type: string
                  description: LLM model ID (e.g. qwen3-235b-a22b)
                runtime:
                  type: string
                  enum: [openclaw, copaw]
                  default: openclaw
                image:
                  type: string
                  description: Custom Docker image for this debug worker
                targets:
                  type: array
                  items:
                    type: string
                  description: Target Worker names to debug
                matrixCredential:
                  type: object
                  description: Credentials for Matrix message export
                  properties:
                    userID:
                      type: string
                      description: Matrix user ID (@user:domain)
                    accessToken:
                      type: string
                      description: Matrix access token
                hiclawVersion:
                  type: string
                  description: HiClaw code version for source reference
                accessControl:
                  type: object
                  description: Access restrictions for the DebugWorker
                  properties:
                    allowedUsers:
                      type: array
                      items:
                        type: string
                      description: Matrix user IDs allowed to interact
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Failed]
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Targets
          type: string
          jsonPath: .spec.targets
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: debugworkers
    singular: debugworker
    kind: DebugWorker
    shortNames: [dw]
