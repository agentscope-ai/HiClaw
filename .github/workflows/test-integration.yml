name: Integration Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'manager/**'
      - '.github/workflows/test-integration.yml'
  push:
    branches:
      - main
    paths:
      - 'manager/**'
  workflow_dispatch:
    inputs:
      test_case:
        description: 'Specific test case to run (e.g., test-02-create-worker.sh). Leave empty to run all tests.'
        required: false
        default: ''

env:
  # Local image tags (no registry push needed)
  MANAGER_IMAGE: hiclaw/manager-agent:ci-test
  WORKER_IMAGE: hiclaw/worker-agent:ci-test

jobs:
  # Build images locally (no registry push)
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Free Up GitHub Actions Ubuntu Runner Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pull base images first to ensure they're available
      - name: Pull base images
        run: |
          docker pull higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/openclaw-base:latest

      # Build manager and worker images locally (no push)
      - name: Build images
        run: |
          make build-manager build-worker VERSION=ci-test

      - name: List built images
        run: |
          docker images | grep hiclaw

      - name: Build Summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Manager Image: \`${{ env.MANAGER_IMAGE }}\` (local)" >> $GITHUB_STEP_SUMMARY
          echo "- Worker Image: \`${{ env.WORKER_IMAGE }}\` (local)" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: \`linux/amd64\` (native)" >> $GITHUB_STEP_SUMMARY

  # Run integration tests with local images
  integration-tests:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      actions: read
    
    steps:
      - name: Free Up GitHub Actions Ubuntu Runner Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pull base images first
      - name: Pull base images
        run: |
          docker pull higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/openclaw-base:latest

      # Rebuild images (needed since each job runs on fresh runner)
      - name: Build images
        run: |
          make build-manager build-worker VERSION=ci-test

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Run HiClaw installation
        run: |
          # Install HiClaw with local images
          HICLAW_LLM_API_KEY="${{ secrets.HICLAW_LLM_API_KEY }}" \
          HICLAW_NON_INTERACTIVE=1 \
          HICLAW_VERSION=ci-test \
          HICLAW_MOUNT_SOCKET=1 \
          HICLAW_INSTALL_MANAGER_IMAGE=${{ env.MANAGER_IMAGE }} \
          HICLAW_INSTALL_WORKER_IMAGE=${{ env.WORKER_IMAGE }} \
          ./install/hiclaw-install.sh manager

      - name: Wait for Manager to be ready
        run: |
          echo "Waiting for Manager to be healthy..."
          for i in {1..60}; do
            if docker exec hiclaw-manager curl -sf http://127.0.0.1:8001/ >/dev/null 2>&1; then
              echo "Manager console is ready!"
              # Additional wait for internal services
              sleep 10
              # Check internal services via docker exec
              if docker exec hiclaw-manager curl -sf http://127.0.0.1:6167/_matrix/client/versions >/dev/null 2>&1; then
                echo "Matrix is ready!"
                # Wait for agent initialization
                echo "Waiting 60s for Manager Agent initialization..."
                sleep 60
                exit 0
              fi
            fi
            echo "Waiting... ($i/60)"
            sleep 5
          done
          echo "Manager did not become healthy in time"
          docker logs hiclaw-manager --tail 50
          exit 1

      - name: Run integration tests
        env:
          HICLAW_LLM_API_KEY: ${{ secrets.HICLAW_LLM_API_KEY }}
          TEST_MANAGER_CONTAINER: hiclaw-manager
          TEST_GATEWAY_PORT: "8080"
          TEST_CONSOLE_PORT: "8001"
        run: |
          # Enable YOLO mode for automated testing
          docker exec hiclaw-manager touch /root/manager-workspace/yolo-mode
          
          # Run specific test or all tests
          if [ -n "${{ github.event.inputs.test_case }}" ]; then
            echo "Running specific test: ${{ github.event.inputs.test_case }}"
            ./tests/${{ github.event.inputs.test_case }}
          else
            echo "Running all integration tests..."
            ./tests/run-all-tests.sh --skip-build --use-existing
          fi

      # ============================================================
      # Metrics Comparison & PR Comment
      # ============================================================

      - name: Download previous baseline metrics
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Get the list of workflow runs for this PR's target branch
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'test-integration.yml',
              branch: context.payload.pull_request.base.ref,
              status: 'success',
              per_page: 1
            });
            
            if (runs.data.workflow_runs.length === 0) {
              console.log('No previous successful runs found');
              return;
            }
            
            const previousRun = runs.data.workflow_runs[0];
            console.log(`Found previous run: ${previousRun.id} (${previousRun.head_sha})`);
            
            // Get artifacts from the previous run
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: previousRun.id
            });
            
            // Find the baseline artifact
            const baselineArtifact = artifacts.data.artifacts.find(a => a.name.startsWith('metrics-baseline-'));
            if (!baselineArtifact) {
              console.log('No baseline artifact found in previous run');
              return;
            }
            
            console.log(`Found baseline artifact: ${baselineArtifact.name}`);
            
            // Download the artifact
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: baselineArtifact.id,
              archive_format: 'zip'
            });
            
            // Save the zip file
            const zipPath = path.join(process.cwd(), 'baseline.zip');
            fs.writeFileSync(zipPath, Buffer.from(download.data));
            console.log(`Downloaded baseline to ${zipPath}`);
            
            // Extract using shell
            const { execSync } = require('child_process');
            execSync('mkdir -p baseline-metrics && unzip -o baseline.zip -d baseline-metrics', { stdio: 'inherit' });
            console.log('Extracted baseline metrics');

      - name: Compare metrics with baseline and post PR comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          
          # Source the metrics library
          source tests/lib/agent-metrics.sh
          
          # Generate current metrics summary
          echo "Generating current metrics summary..."
          CURRENT_SUMMARY=$(generate_metrics_summary "02-create-worker")
          
          # Check for baseline
          BASELINE_SUMMARY=""
          if [ -d "baseline-metrics" ] && [ -f "baseline-metrics/metrics-summary.json" ]; then
            echo "Found baseline metrics, loading..."
            BASELINE_SUMMARY=$(cat baseline-metrics/metrics-summary.json)
          else
            echo "No baseline metrics found, this will be the first run"
          fi
          
          # Compare metrics
          echo "Comparing metrics..."
          COMPARISON=$(compare_metrics_with_baseline "$CURRENT_SUMMARY" "$BASELINE_SUMMARY")
          
          # Generate Markdown report
          echo "Generating Markdown report..."
          MARKDOWN_REPORT=$(generate_comparison_markdown "$COMPARISON")
          
          # Save for debugging
          mkdir -p tests/output
          echo "$COMPARISON" > tests/output/metrics-comparison.json
          echo "$MARKDOWN_REPORT" > tests/output/metrics-report.md
          
          # Post PR comment (update existing if present)
          echo "Posting PR comment..."
          
          # Check for existing comment
          EXISTING_COMMENT=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | startswith("## 📊 CI Metrics Report")) | .id')
          
          if [ -n "$EXISTING_COMMENT" ]; then
            echo "Updating existing comment: $EXISTING_COMMENT"
            gh api --method PATCH repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT \
              -f body="$MARKDOWN_REPORT"
          else
            echo "Creating new comment"
            gh api --method POST repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -f body="$MARKDOWN_REPORT"
          fi
          
          echo "Metrics report posted successfully!"

      - name: Save baseline metrics for future runs
        if: always()
        run: |
          mkdir -p baseline-output
          
          # Generate and save summary for future comparison
          if [ -d "tests/output" ] && ls tests/output/metrics-*.json 1>/dev/null 2>&1; then
            source tests/lib/agent-metrics.sh
            generate_metrics_summary "02-create-worker" > baseline-output/metrics-summary.json
            echo "Saved metrics summary for future runs"
          else
            echo '{"error": "no metrics files found", "timestamp": "'$(date -Iseconds)'"}' > baseline-output/metrics-summary.json
          fi

      - name: Upload baseline metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-baseline-${{ github.sha }}
          path: baseline-output/
          retention-days: 30

      - name: Collect test artifacts
        if: always()
        run: |
          mkdir -p test-artifacts
          
          # Copy test output files
          if [ -d "tests/output" ]; then
            cp -r tests/output/* test-artifacts/ 2>/dev/null || true
          fi
          
          # Collect Manager logs
          docker logs hiclaw-manager > test-artifacts/manager.log 2>&1 || true
          docker exec hiclaw-manager cat /var/log/hiclaw/manager-agent.log > test-artifacts/manager-agent.log 2>&1 || true
          
          # Collect Worker logs (if any)
          for container in $(docker ps -a --format '{{.Names}}' | grep hiclaw-worker); do
            docker logs "$container" > "test-artifacts/${container}.log" 2>&1 || true
          done

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.sha }}
          path: test-artifacts/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          make uninstall || true
          docker system prune -af || true

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Manager Image: \`${{ env.MANAGER_IMAGE }}\` (local build)" >> $GITHUB_STEP_SUMMARY
          echo "- Worker Image: \`${{ env.WORKER_IMAGE }}\` (local build)" >> $GITHUB_STEP_SUMMARY
          echo "- No registry push required" >> $GITHUB_STEP_SUMMARY
