apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: teams.hiclaw.io
spec:
  group: hiclaw.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: "Team is a pure coordination CR. It does not embed Worker specs. Members are observed via list of Worker CRs with spec.teamRef matching this Team's name; admins are observed via list of Human CRs with teamAccess entries."
              properties:
                description:
                  type: string
                peerMentions:
                  type: boolean
                  description: "Whether team workers can @mention each other in group rooms (default: true)"
                channelPolicy:
                  type: object
                  description: "Team-wide communication policy defaults (merged into per-worker effective policy)"
                  properties:
                    groupAllowExtra:
                      type: array
                      items:
                        type: string
                    groupDenyExtra:
                      type: array
                      items:
                        type: string
                    dmAllowExtra:
                      type: array
                      items:
                        type: string
                    dmDenyExtra:
                      type: array
                      items:
                        type: string
                heartbeat:
                  type: object
                  description: "Leader heartbeat configuration"
                  properties:
                    enabled:
                      type: boolean
                    every:
                      type: string
                      description: "Heartbeat interval, e.g. 15m, 1h (Go duration format)"
                workerIdleTimeout:
                  type: string
                  description: "Idle timeout for team workers, e.g. 720m (Go duration format)"
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum: [Pending, Active, Degraded, Failed]
                teamRoomID:
                  type: string
                leaderDMRoomID:
                  type: string
                leader:
                  type: object
                  description: "Observed team leader (nil if no leader or multiple leaders detected)"
                  properties:
                    name:
                      type: string
                    matrixUserID:
                      type: string
                    ready:
                      type: boolean
                members:
                  type: array
                  description: "Observed team_worker Workers (ordered by name)"
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      role:
                        type: string
                      matrixUserID:
                        type: string
                      ready:
                        type: boolean
                admins:
                  type: array
                  description: "Observed Humans with teamAccess[].role=admin targeting this Team"
                  items:
                    type: object
                    properties:
                      humanName:
                        type: string
                      matrixUserID:
                        type: string
                totalMembers:
                  type: integer
                readyMembers:
                  type: integer
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Leader
          type: string
          jsonPath: .status.leader.name
        - name: Members
          type: integer
          jsonPath: .status.totalMembers
        - name: Ready
          type: integer
          jsonPath: .status.readyMembers
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: teams
    singular: team
    kind: Team
    shortNames: [tm]
