apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workers.hiclaw.io
spec:
  group: hiclaw.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [model]
              properties:
                model:
                  type: string
                runtime:
                  type: string
                  enum: [openclaw, copaw]
                image:
                  type: string
                role:
                  type: string
                  enum: [standalone, team_leader, team_worker]
                  default: standalone
                  description: "Position of this Worker: standalone | team_leader | team_worker. Must be consistent with teamRef (non-standalone requires teamRef)."
                teamRef:
                  type: string
                  description: "Name of the Team this Worker belongs to. Required when role != standalone; must be empty when role = standalone."
                identity:
                  type: string
                soul:
                  type: string
                agents:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                mcpServers:
                  type: array
                  items:
                    type: string
                package:
                  type: string
                expose:
                  type: array
                  description: Ports to expose via Higress gateway
                  items:
                    type: object
                    required: [port]
                    properties:
                      port:
                        type: integer
                      protocol:
                        type: string
                        enum: [http, grpc]
                        default: http
                channelPolicy:
                  type: object
                  properties:
                    groupAllowExtra:
                      type: array
                      items:
                        type: string
                    groupDenyExtra:
                      type: array
                      items:
                        type: string
                    dmAllowExtra:
                      type: array
                      items:
                        type: string
                    dmDenyExtra:
                      type: array
                      items:
                        type: string
                state:
                  type: string
                  enum: [Running, Sleeping, Stopped]
                  description: "Desired lifecycle state (default: Running)"
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                matrixUserID:
                  type: string
                roomID:
                  type: string
                containerState:
                  type: string
                lastHeartbeat:
                  type: string
                message:
                  type: string
                teamRef:
                  type: string
                  description: "Observed teamRef value (used to detect cross-team migration)"
                exposedPorts:
                  type: array
                  items:
                    type: object
                    properties:
                      port:
                        type: integer
                      domain:
                        type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Role
          type: string
          jsonPath: .spec.role
        - name: Team
          type: string
          jsonPath: .spec.teamRef
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: workers
    singular: worker
    kind: Worker
    shortNames: [wk]
