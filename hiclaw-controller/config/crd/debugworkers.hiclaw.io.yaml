apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: debugworkers.hiclaw.io
spec:
  group: hiclaw.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [model, targets]
              properties:
                model:
                  type: string
                  description: LLM model ID for the debug agent
                runtime:
                  type: string
                  enum: [openclaw, copaw]
                  default: openclaw
                image:
                  type: string
                  description: Custom Docker image override
                targets:
                  type: array
                  description: Target Worker names to debug (their workspaces will be mounted read-only)
                  items:
                    type: string
                matrixCredential:
                  type: object
                  description: Matrix credentials for exporting room messages from target Workers
                  properties:
                    userID:
                      type: string
                      description: "Matrix user ID (@user:domain)"
                    accessToken:
                      type: string
                      description: Matrix access token (syt_xxx)
                hiclawVersion:
                  type: string
                  description: HiClaw code version for source code reference
                accessControl:
                  type: object
                  properties:
                    allowedUsers:
                      type: array
                      items:
                        type: string
                      description: Matrix user IDs allowed to interact with this DebugWorker
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Failed]
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Targets
          type: string
          jsonPath: .spec.targets
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: debugworkers
    singular: debugworker
    kind: DebugWorker
    shortNames: [dw]
