apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: humans.hiclaw.io
spec:
  group: hiclaw.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [displayName]
              properties:
                displayName:
                  type: string
                email:
                  type: string
                  format: email
                note:
                  type: string
                superAdmin:
                  type: boolean
                  description: "When true, grants access to every Team and Worker. Must not be set together with teamAccess/workerAccess."
                teamAccess:
                  type: array
                  description: "Per-team access declarations (replaces accessibleTeams and Team.spec.admin)."
                  items:
                    type: object
                    required: [team, role]
                    properties:
                      team:
                        type: string
                      role:
                        type: string
                        enum: [admin, member]
                workerAccess:
                  type: array
                  description: "Direct worker-level access (replaces accessibleWorkers)."
                  items:
                    type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum: [Pending, Active, Failed]
                matrixUserID:
                  type: string
                initialPassword:
                  type: string
                  description: "Generated password, shown once on creation"
                rooms:
                  type: array
                  items:
                    type: string
                emailSent:
                  type: boolean
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: SuperAdmin
          type: boolean
          jsonPath: .spec.superAdmin
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Email Sent
          type: boolean
          jsonPath: .status.emailSent
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: humans
    singular: human
    kind: Human
    shortNames: [hm]
